<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Analyse automatique des PPIs</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── Themes ── */
:root{
  --bg:#0f1117;--surface:#181b24;--surface2:#1e2130;--border:#252833;
  --accent:#5b8dee;--accent2:#3ecf8e;--danger:#ef4444;--warn:#f59e0b;
  --text:#e2e8f0;--muted:#64748b;--radius:8px;
  --mono:'JetBrains Mono','Fira Mono',monospace;
  --shadow:0 2px 12px rgba(0,0,0,.35);
}
[data-theme="light"]{
  --bg:#f0f2f7;--surface:#ffffff;--surface2:#f7f8fc;--border:#dde1ea;
  --accent:#2563eb;--accent2:#059669;--danger:#dc2626;--warn:#d97706;
  --text:#1e2433;--muted:#6b7280;
  --shadow:0 2px 12px rgba(0,0,0,.08);
}

body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.6;min-height:100vh;transition:background .2s,color .2s}

/* ── Layout ── */
.app{display:flex;flex-direction:column;min-height:100vh}

/* ── Header ── */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px}
.header-top{display:flex;align-items:center;gap:14px;padding:10px 0 8px}
.logos{display:flex;align-items:center;gap:10px}
.logos img{height:32px;object-fit:contain}
.header-divider{width:1px;height:28px;background:var(--border);margin:0 4px}
.header-titles{flex:1;min-width:0}
.header-titles h1{font-size:13px;font-weight:700;line-height:1.3;letter-spacing:.01em}
.header-titles p{font-size:11px;color:var(--muted);margin-top:1px}
.header-actions{display:flex;align-items:center;gap:8px}
.theme-btn{
  width:32px;height:32px;border-radius:50%;border:1px solid var(--border);
  background:var(--surface2);cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;
  transition:border-color .15s,background .15s;
}
.theme-btn:hover{border-color:var(--accent);background:var(--bg)}
.server-dot{width:7px;height:7px;border-radius:50%;background:var(--accent2);box-shadow:0 0 5px var(--accent2)}
.server-status{font-size:11px;color:var(--muted)}

/* ── Tabs ── */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);background:var(--surface)}
.tab{
  padding:9px 16px;font-size:13px;cursor:pointer;
  border:none;background:none;color:var(--muted);
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:color .15s,border-color .15s;
}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-badge{
  display:inline-block;background:var(--accent);color:#fff;
  font-size:10px;padding:1px 5px;border-radius:10px;margin-left:5px;
}

.content{flex:1;padding:24px;max-width:940px;margin:0 auto;width:100%}

/* ── Card ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.card-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px}

/* ── Form ── */
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
.field input,.field select{
  width:100%;padding:8px 10px;background:var(--bg);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--text);font-size:13px;font-family:inherit;
  transition:border-color .15s;
}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent)}
.field input[type=number]{width:110px}
.row{display:flex;gap:12px;flex-wrap:wrap}
.row .field{flex:1;min-width:120px}
.check-row{display:flex;align-items:center;gap:7px}
.check-row label{margin:0;cursor:pointer;color:var(--text);font-size:13px}
.check-row input[type=checkbox]{accent-color:var(--accent);width:14px;height:14px}

/* ── Props grid ── */
.props-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:8px;margin-top:6px;
}
.prop-check{
  display:flex;align-items:center;gap:8px;padding:7px 10px;
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);
  cursor:pointer;transition:border-color .15s;
}
.prop-check:hover{border-color:var(--accent)}
.prop-check input[type=checkbox]{accent-color:var(--accent);width:13px;height:13px;flex-shrink:0}
.prop-check label{font-size:12px;cursor:pointer;margin:0;color:var(--text)}
.props-actions{display:flex;gap:8px;margin-bottom:8px}
.props-actions button{
  font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;
  padding:0;text-decoration:underline;
}
.props-actions button:hover{color:var(--accent)}

/* ── Mode toggle Simple/Avancé ── */
.mode-toggle{display:inline-flex;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:18px}
.mode-btn{padding:6px 18px;font-size:12px;cursor:pointer;background:none;border:none;color:var(--muted);transition:background .15s,color .15s}
.mode-btn.active{background:var(--accent);color:#fff}

/* ── Drop zone ── */
.dropzone{
  border:2px dashed var(--border);border-radius:var(--radius);
  padding:24px 20px;text-align:center;cursor:pointer;position:relative;
  transition:border-color .2s,background .2s;
}
.dropzone:hover,.dropzone.over{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 5%,transparent)}
.dropzone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.dropzone.has-file{border-style:solid;border-color:var(--accent2)}
.dz-icon{font-size:26px;margin-bottom:6px}
.dz-label{font-size:13px;color:var(--muted)}
.dropzone.has-file .dz-label{color:var(--accent2);font-weight:500}
.dz-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* ── Buttons ── */
.btn{padding:8px 20px;border-radius:var(--radius);border:none;cursor:pointer;font-size:13px;font-weight:500;transition:opacity .15s,transform .1s}
.btn:hover{opacity:.85}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}
.btn-danger{background:color-mix(in srgb,var(--danger) 15%,transparent);color:var(--danger);border:1px solid color-mix(in srgb,var(--danger) 30%,transparent)}
.btn-warn{background:color-mix(in srgb,var(--warn) 15%,transparent);color:var(--warn);border:1px solid color-mix(in srgb,var(--warn) 30%,transparent)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--text)}
.btn:disabled{opacity:.35;cursor:not-allowed}

/* ── Jobs list ── */
.jobs-list{display:flex;flex-direction:column;gap:10px}
.job-row{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px 16px;
  display:grid;grid-template-columns:auto 1fr auto;
  align-items:start;gap:14px;transition:border-color .15s;
}
.job-row:hover{border-color:color-mix(in srgb,var(--accent) 40%,var(--border))}
.job-body{min-width:0}
.job-expr{font-weight:600;font-size:13px;margin-bottom:2px}
.job-meta{font-size:11px;color:var(--muted);display:flex;flex-wrap:wrap;gap:4px 10px;margin-bottom:4px}
.job-progress-wrap{margin-top:6px;margin-bottom:6px}
.job-progress-bar{
  height:3px;background:var(--border);border-radius:2px;overflow:hidden;
}
.job-progress-fill{
  height:100%;background:var(--accent);border-radius:2px;
  transition:width .5s ease;
}
.job-progress-fill.done{background:var(--accent2)}
.job-progress-fill.error{background:var(--danger)}
.job-actions{display:flex;gap:6px;flex-shrink:0;flex-direction:column;align-items:flex-end}

/* ── Recap ── */
.recap-toggle{font-size:11px;color:var(--muted);cursor:pointer;background:none;border:none;padding:0;text-decoration:underline;margin-top:2px}
.recap-toggle:hover{color:var(--accent)}
.recap-box{
  margin-top:8px;padding:10px 12px;background:var(--surface2);
  border:1px solid var(--border);border-radius:var(--radius);
  font-size:11px;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:4px 16px;
}
.recap-item{display:flex;gap:5px}
.recap-key{color:var(--muted)}
.recap-val{color:var(--text);font-family:var(--mono)}

/* ── Status pill ── */
.status-pill{
  display:inline-flex;align-items:center;gap:5px;
  font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em;
  padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0;margin-top:1px;
}
.status-pill.running{background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)}
.status-pill.done{background:color-mix(in srgb,var(--accent2) 15%,transparent);color:var(--accent2)}
.status-pill.error{background:color-mix(in srgb,var(--danger) 15%,transparent);color:var(--danger)}
.status-pill.stopped{background:color-mix(in srgb,var(--warn) 15%,transparent);color:var(--warn)}
.pulse{animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ── Logs panel ── */
.logs-panel{
  background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);
  margin-top:8px;overflow:hidden;
}
.logs-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 12px;background:var(--surface2);border-bottom:1px solid var(--border);
  font-size:11px;color:var(--muted);cursor:pointer;user-select:none;
}
.logs-header:hover{color:var(--text)}
.logs-body{
  font-family:var(--mono);font-size:11px;line-height:1.7;
  padding:10px 12px;max-height:240px;overflow-y:auto;
  color:color-mix(in srgb,var(--text) 80%,transparent);
}
.log-line{white-space:pre-wrap;word-break:break-all}
.log-line.warn{color:var(--warn)}
.log-line.error{color:var(--danger)}
.logs-empty{color:var(--muted);font-style:italic}

/* ── Results ── */
.results-back{font-size:12px;color:var(--muted);cursor:pointer;margin-bottom:14px;display:inline-flex;align-items:center;gap:4px}
.results-back:hover{color:var(--accent)}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;flex:1;min-width:110px}
.stat .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.stat .value{font-size:21px;font-weight:700;font-family:var(--mono);margin-top:3px}
.file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
.file-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-decoration:none;color:var(--text);display:block;transition:border-color .15s}
.file-card:hover{border-color:var(--accent)}
.fname{font-size:11px;font-family:var(--mono);word-break:break-all}
.fmeta{font-size:11px;color:var(--muted);margin-top:3px}
.ftype{display:inline-block;margin-top:5px;font-size:10px;text-transform:uppercase;letter-spacing:.05em;padding:1px 6px;border-radius:3px}
.ftype.xlsx{background:color-mix(in srgb,var(--accent2) 15%,transparent);color:var(--accent2)}
.ftype.pdf{background:color-mix(in srgb,#f97316 15%,transparent);color:#f97316}
.ftype.json{background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)}
.ftype.other{background:var(--border);color:var(--muted)}
.error-box{background:color-mix(in srgb,var(--danger) 8%,transparent);border:1px solid color-mix(in srgb,var(--danger) 30%,transparent);border-radius:var(--radius);padding:14px;font-size:11px;font-family:var(--mono);color:color-mix(in srgb,var(--danger) 80%,var(--text));white-space:pre-wrap;word-break:break-all;max-height:300px;overflow-y:auto}

/* ── Empty ── */
.empty{text-align:center;padding:60px 0;color:var(--muted)}
.empty .icon{font-size:36px;margin-bottom:10px}

.err-inline{color:var(--danger);font-size:12px;margin-bottom:10px}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;font-size:13px;box-shadow:var(--shadow);animation:slideUp .2s ease;z-index:999}
@keyframes slideUp{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── Banner ── */
.site-banner{
  width:100%;height:120px;
  background-size:cover;background-position:center 30%;
  position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.site-banner::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,
    color-mix(in srgb,var(--bg) 10%,transparent) 0%,
    color-mix(in srgb,var(--bg) 60%,transparent) 100%);
}
.banner-text{
  position:relative;z-index:1;text-align:center;
  text-shadow:0 1px 8px rgba(0,0,0,.55);
}
.banner-text h2{
  font-size:22px;font-weight:800;letter-spacing:.02em;
  color:var(--text);line-height:1.2;
}
.banner-text p{
  font-size:12px;color:var(--muted);margin-top:4px;
  font-style:italic;
}

/* ── Offline banner ── */
.offline-notice{
  background:color-mix(in srgb,var(--warn) 12%,transparent);
  border-bottom:1px solid color-mix(in srgb,var(--warn) 30%,transparent);
  color:var(--warn);font-size:12px;text-align:center;padding:6px;
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;
const API = "http://0.0.0.0:8000";

const LIDILEM_LOGO = "https://lidilem.univ-grenoble-alpes.fr/sites/default/files/theme/logo-lidilem_0.svg";
const UGA_LOGO     = "https://lidilem.univ-grenoble-alpes.fr/sites/default/files/2023-11/logo-uga.png";

// ── Propriétés analysables ─────────────────────────────────────────────────

const ALL_PROPS = [
  { key: "Acception",                 label: "Acception" },
  { key: "type_phrase",               label: "Type de phrase" },
  { key: "Modalite",                  label: "Modalité" },
  { key: "Position",                  label: "Position" },
  { key: "Particularites_syntaxiques",label: "Particularités syntaxiques" },
  { key: "Expansions",                label: "Expansions" },
  { key: "Modifieurs",                label: "Modifieurs" },
  { key: "Coocurrents",               label: "Cooccurrents" },
  { key: "Portee",                    label: "Portée" },
  { key: "Declenchement",             label: "Déclenchement" },
  { key: "Fonction_globale",          label: "Fonction globale" },
  { key: "Fonction_specifique",       label: "Fonction spécifique" },
  { key: "Remarques_diverses",        label: "Remarques diverses" },
];

// ── LocalStorage helpers ───────────────────────────────────────────────────

const LS_SETTINGS = "ppi_settings_v2";
const LS_JOBS     = "ppi_jobs_history";

function loadSettings() {
  try { return JSON.parse(localStorage.getItem(LS_SETTINGS)) || {}; } catch { return {}; }
}
function saveSettings(s) {
  try { localStorage.setItem(LS_SETTINGS, JSON.stringify(s)); } catch {}
}

// Persisted job history – merges with live server data
function loadJobHistory() {
  try { return JSON.parse(localStorage.getItem(LS_JOBS)) || []; } catch { return []; }
}
function saveJobHistory(jobs) {
  try { localStorage.setItem(LS_JOBS, JSON.stringify(jobs)); } catch {}
}

// ── utils ──────────────────────────────────────────────────────────────────

function timeAgo(iso) {
  if (!iso) return "—";
  const d = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (d < 60) return `${d}s`; if (d < 3600) return `${Math.floor(d/60)}m`; return `${Math.floor(d/3600)}h`;
}
function duration(a, b) {
  if (!a || !b) return null;
  const d = Math.round((new Date(b) - new Date(a)) / 1000);
  return d < 60 ? `${d}s` : `${Math.floor(d/60)}m ${d%60}s`;
}

// ── StatusPill ────────────────────────────────────────────────────────────

function StatusPill({ status, stopping }) {
  const label = stopping ? "arrêt…"
    : status === "running" ? "en cours"
    : status === "done" ? "terminé"
    : status === "error" ? "erreur"
    : status === "stopped" ? "arrêté"
    : status;
  const cls = stopping ? "running" : status;
  return (
    <span className={`status-pill ${cls}`}>
      {(status === "running" || stopping) && <span className="pulse">●</span>}
      {status === "done" && !stopping && "✓"}
      {status === "error" && !stopping && "✗"}
      {label}
    </span>
  );
}

// ── Toast ─────────────────────────────────────────────────────────────────

function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 3500); return () => clearTimeout(t); }, []);
  return <div className="toast">{msg}</div>;
}

// ── PrefabBadge ───────────────────────────────────────────────────────────

function PrefabBadge() {
  return (
    <span style={{
      fontFamily:"var(--mono)", fontSize:13, fontWeight:700,
      color:"var(--accent)", letterSpacing:".03em",
      padding:"3px 8px", border:"1px solid var(--accent)",
      borderRadius:4, background:"color-mix(in srgb,var(--accent) 10%,transparent)",
      lineHeight:1,
    }}>
      PRE<span style={{color:"var(--text)"}}>FAB</span>
    </span>
  );
}

// ── FileDropzone ──────────────────────────────────────────────────────────

// ── ExcelPreviewModal ─────────────────────────────────────────────────────

function ExcelPreviewModal({ file, onClose }) {
  const [rows, setRows]     = useState(null);
  const [headers, setHdrs]  = useState([]);
  const [error, setError]   = useState(null);

  useEffect(() => {
    if (!file) return;
    setRows(null); setHdrs([]); setError(null);
    const fd = new FormData();
    fd.append("file", file);
    fetch(`${API}/preview`, { method: "POST", body: fd })
      .then(r => r.ok ? r.json() : r.json().then(e => Promise.reject(e.detail)))
      .then(d => { setHdrs(d.header); setRows(d.rows); })
      .catch(e => setError("Erreur : " + e));
  }, [file]);

  return (
    <div style={{
      position:"fixed",inset:0,background:"rgba(0,0,0,.7)",
      display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,
    }} onClick={onClose}>
      <div style={{
        background:"var(--surface)",border:"1px solid var(--border)",
        borderRadius:"var(--radius)",padding:20,maxWidth:"92vw",width:860,
        maxHeight:"82vh",display:"flex",flexDirection:"column",
      }} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <span style={{fontWeight:700,fontSize:14}}>Aperçu — {file?.name}</span>
          <button className="btn btn-ghost" style={{padding:"4px 10px",fontSize:12}} onClick={onClose}>Fermer</button>
        </div>
        {error && <div className="err-inline">{error}</div>}
        {!rows && !error && <p style={{color:"var(--muted)",fontSize:13}}>Chargement…</p>}
        {rows && (
          <div style={{overflowX:"auto",overflowY:"auto",flex:1}}>
            <table style={{borderCollapse:"collapse",fontSize:11,width:"100%",fontFamily:"var(--mono)"}}>
              <thead>
                <tr style={{background:"var(--surface2)"}}>
                  <th style={{padding:"5px 8px",border:"1px solid var(--border)",color:"var(--muted)",textAlign:"center"}}>#</th>
                  {headers.map((h,i)=>(
                    <th key={i} style={{padding:"5px 8px",border:"1px solid var(--border)",color:"var(--accent)",whiteSpace:"nowrap",textAlign:"left"}}>{String(h)}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {rows.map((row,ri)=>(
                  <tr key={ri} style={{background:ri%2===0?"var(--bg)":"var(--surface2)"}}>
                    <td style={{padding:"4px 8px",border:"1px solid var(--border)",color:"var(--muted)",textAlign:"center"}}>{ri+2}</td>
                    {headers.map((_,ci)=>(
                      <td key={ci} style={{padding:"4px 8px",border:"1px solid var(--border)",maxWidth:220,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}
                        title={String(row[ci]??"")}>{String(row[ci]??"")}</td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
            <p style={{fontSize:11,color:"var(--muted)",marginTop:8}}>Contenu du fichier excel (indices Excel affichés).</p>
          </div>
        )}
      </div>
    </div>
  );
}

// ── InfoBubble ────────────────────────────────────────────────────────────

function InfoBubble({ text }) {
  const [show, setShow] = useState(false);
  return (
    <span style={{position:"relative",display:"inline-flex",alignItems:"center",marginLeft:5}}>
      <button
        style={{
          width:15,height:15,borderRadius:"50%",border:"1px solid var(--muted)",
          background:"var(--surface2)",color:"var(--muted)",fontSize:9,
          cursor:"pointer",display:"inline-flex",alignItems:"center",justifyContent:"center",
          fontWeight:700,lineHeight:1,padding:0,flexShrink:0,
        }}
        onMouseEnter={()=>setShow(true)} onMouseLeave={()=>setShow(false)}
        onFocus={()=>setShow(true)} onBlur={()=>setShow(false)}
      >i</button>
      {show && (
        <span style={{
          position:"absolute",left:"calc(100% + 6px)",top:"50%",transform:"translateY(-50%)",
          background:"var(--surface)",border:"1px solid var(--border)",
          borderRadius:"var(--radius)",padding:"7px 10px",fontSize:11,color:"var(--text)",
          lineHeight:1.5,width:230,zIndex:500,boxShadow:"var(--shadow)",
          pointerEvents:"none",
        }}>{text}</span>
      )}

}

function FieldLabel({ children, info }) {

    <label style={{display:"flex",alignItems:"center",fontSize:12,color:"var(--muted)",marginBottom:4}}>
      {children}
      {info && <InfoBubble text={info}/>}
    </label>

function FileDropzone({ file, onChange, onPreview }) {
  const [over, setOver] = useState(false);
  return (
    <div>
      <div className={`dropzone ${over?"over":""} ${file?"has-file":""}`}
        onDragOver={e=>{e.preventDefault();setOver(true)}}
        onDragLeave={()=>setOver(false)}
        onDrop={e=>{e.preventDefault();setOver(false);const f=e.dataTransfer.files[0];if(f)onChange(f)}}>
        <input type="file" accept=".xlsx" onChange={e=>e.target.files[0]&&onChange(e.target.files[0])}/>
        <div className="dz-icon">{file?"📊":"📂"}</div>
        <div className="dz-label">{file?file.name:"Glissez un fichier .xlsx ou cliquez pour parcourir"}</div>
        {!file&&<div className="dz-sub">Concordances au format Excel (left / node / right)</div>}
      </div>

        <button className="btn btn-ghost" style={{marginTop:6,fontSize:11,padding:"4px 12px"}}
          onClick={onPreview} type="button">

        </button>

// ── PropsSelector ─────────────────────────────────────────────────────────

function PropsSelector({ selected, onChange }) {
  const allKeys = ALL_PROPS.map(p => p.key);
  const toggle = (key) => {
    const next = selected.includes(key) ? selected.filter(k => k !== key) : [...selected, key];
    onChange(next);
  };
  return (
    <div>
      <div className="props-actions">
        <button onClick={()=>onChange(allKeys)}>Tout cocher</button>
        <button onClick={()=>onChange([])}>Tout décocher</button>
      </div>
      <div className="props-grid">
        {ALL_PROPS.map(p => (
          <label key={p.key} className="prop-check">
            <input type="checkbox" checked={selected.includes(p.key)}
              onChange={()=>toggle(p.key)}/>
            <span style={{fontSize:12}}>{p.label}</span>
          </label>
        ))}
      </div>
    </div>
  );
}

// ── AnalyseForm ───────────────────────────────────────────────────────────

const DEFAULTS = {
  mode: "oral",
  start_sent: 2,        // display index (backend = display - 2)
  max_sentences: "all",
  all_sentences: true,
  batch_size: 5,        // hidden from UI
  n_threads: 8,         // hidden from UI
  use_analysis_cache: true,
  selected_props: ALL_PROPS.map(p => p.key),
};

// Detect mode from filename suffix
function modeFromFilename(name) {
  if (!name) return null;
  if (name.endsWith("_Ph.xlsx")) return "écrit_ia";
  if (name.endsWith("_Or.xlsx")) return "oral";
  return null;
}

function AnalyseForm({ onJobStarted, hasRunningJob }) {
  const [file, setFile]         = useState(null);
  const [expression, setExpr]   = useState("");
  const [advanced, setAdvanced] = useState(false);
  const [preview, setPreview]   = useState(false);
  const [settings, setSettings] = useState(() => {
    const saved = loadSettings();
    return {
      ...DEFAULTS,
      ...saved,
      selected_props: saved.selected_props ?? DEFAULTS.selected_props,
      all_sentences: saved.all_sentences !== undefined ? saved.all_sentences : true,
    };
  });
  const [loading, setLoading]   = useState(false);
  const [error, setError]       = useState(null);
  const [totalRows, setTotalRows] = useState(null); // total data rows in the file

  const set = (k, v) => {
    const next = { ...settings, [k]: v };
    setSettings(next);
    saveSettings(next);
  };

  // When a file is picked, auto-detect mode, fill expression, and fetch row count
  function handleFileChange(f) {
    setFile(f);
    setTotalRows(null);
    const detected = modeFromFilename(f?.name);
    if (detected) set("mode", detected);
    if (f?.name) {
      const base = f.name.replace(/\.xlsx$/i, "").replace(/_Ph$|_Or$/, "");
      setExpr(base);
    }
    // Fetch total row count from backend
    const fd = new FormData();
    fd.append("file", f);
    fetch(`${API}/preview`, { method: "POST", body: fd })
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(d => setTotalRows(d.total_rows))
      .catch(() => {});
  }

  const displayStart = settings.start_sent ?? 2;

  async function submit() {
    if (!file)             { setError("Veuillez sélectionner un fichier .xlsx."); return; }
    if (!expression.trim()){ setError("Veuillez saisir une expression cible."); return; }
    if (advanced && settings.selected_props.length === 0) {
      setError("Veuillez sélectionner au moins une propriété à analyser."); return;
    }
    setLoading(true); setError(null);
    const fd = new FormData();
    fd.append("file", file);
    fd.append("expression", expression.trim());
    fd.append("model", "mistral_large");
    const s = advanced ? settings : { ...DEFAULTS, mode: settings.mode };

    // Convert display start_sent (2-based) to backend (0-based)
    const backendStart = Math.max(0, (parseInt(s.start_sent) || 2) - 2);
    fd.append("mode", s.mode);
    fd.append("start_sent", String(backendStart));

    // Backend range is half-open [start_sent, max_sentences[  (0-based)
    // display is 2-based inclusive: backend_max = display_end - 2 + 1 = display_end - 1
    // e.g. display start=28 end=28 → backend start=26, max=27 → row 26 only
    let backendMax;
    if (s.all_sentences) {
      backendMax = "all";
    } else {
      const endIdx = parseInt(s.max_sentences);
      backendMax = isNaN(endIdx) ? "all" : String(endIdx - 1);
    }
    fd.append("max_sentences", backendMax);
    fd.append("batch_size", String(s.batch_size));
    fd.append("n_threads", String(s.n_threads));
    fd.append("use_analysis_cache", s.use_analysis_cache ? "true" : "false");
    const props = advanced ? s.selected_props : DEFAULTS.selected_props;
    fd.append("selected_props", JSON.stringify(props));
    try {
      const res = await fetch(`${API}/analyse`, { method:"POST", body:fd });
      if (!res.ok) { const e = await res.json().catch(()=>({detail:res.statusText})); throw new Error(e.detail); }
      const { job_id } = await res.json();
      onJobStarted(job_id, expression.trim(), { ...s, model:"mistral_large", selected_props: props });
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  }

  return (
    <div className="card">
      {preview && <ExcelPreviewModal file={file} onClose={()=>setPreview(false)}/>}
      <div className="card-title">Nouvelle analyse</div>
      <div className="mode-toggle">
        <button className={`mode-btn ${!advanced?"active":""}`} onClick={()=>setAdvanced(false)}>Simple</button>
        <button className={`mode-btn ${advanced?"active":""}`} onClick={()=>setAdvanced(true)}>Avancé</button>
      </div>

      <div className="field">
        <FieldLabel info="Fichier Excel (.xlsx) de concordances. Le mode est détecté automatiquement selon le suffixe : _Or.xlsx → dialogues authentiques, _Ph.xlsx → dialogues romanesques.">
          Fichier de concordances
        </FieldLabel>
        <FileDropzone file={file} onChange={handleFileChange} onPreview={()=>setPreview(true)}/>
        <div style={{display:"flex",gap:12,marginTop:4,flexWrap:"wrap"}}>
          {file && modeFromFilename(file.name) && (
            <span style={{fontSize:11,color:"var(--accent2)"}}>
              ✓ Mode : {modeFromFilename(file.name)==="oral"?"Dialogues authentiques":"Dialogues romanesques"}
            </span>
          )}
          {totalRows !== null && (
            <span style={{fontSize:11,color:"var(--muted)",fontFamily:"var(--mono)"}}>
              {totalRows} ligne{totalRows>1?"s":""} de données
            </span>
          )}
          {file && totalRows === null && (
            <span style={{fontSize:11,color:"var(--muted)"}}>calcul des lignes…</span>
          )}
        </div>
      </div>

      <div className="field">
        <FieldLabel info="L'expression linguistique à analyser (ex. : « tu veux que je te dise »). Elle doit correspondre aux occurrences présentes dans le fichier de concordances.">
          Expression cible
        </FieldLabel>
        <input placeholder="ex. tu veux que je te dise"
          value={expression} onChange={e=>setExpr(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&submit()}/>
      </div>

      {advanced && (
        <div>
          <div className="row">
            <div className="field">
              <FieldLabel info="Type de corpus analysé. Détecté automatiquement depuis le suffixe du fichier (_Or → authentique, _Ph → romanesque). Peut être modifié manuellement.">
                Mode
              </FieldLabel>
              <select value={settings.mode} onChange={e=>set("mode",e.target.value)}>
                <option value="oral">Dialogues authentiques</option>
                <option value="écrit_ia">Dialogues romanesques</option>
              </select>
            </div>
          </div>

          <div className="row" style={{alignItems:"flex-end"}}>
            <div className="field">
              <FieldLabel info="Numéro de la première ligne à analyser, tel qu'affiché dans Excel (la ligne 2 est la première ligne de données, la ligne 1 étant l'en-tête). En interne, ce numéro est décalé de 2.">
                Index de début (Excel)
                {totalRows && <span style={{color:"var(--muted)",fontSize:10,marginLeft:6,fontFamily:"var(--mono)"}}>max {totalRows+1}</span>}
              </FieldLabel>
              <input type="number" min="2"
                max={totalRows ? totalRows + 1 : undefined}
                value={displayStart}
                onChange={e => {
                  const v = Math.max(2, Math.min(parseInt(e.target.value)||2, totalRows ? totalRows+1 : Infinity));
                  const next = { ...settings, start_sent: v };
                  // bump end index if it became less than new start
                  if (!next.all_sentences && parseInt(next.max_sentences) < v) {
                    next.max_sentences = v;
                  }
                  setSettings(next);
                  saveSettings(next);
                }}/>
            </div>
            <div className="field">
              <FieldLabel info="Index Excel de la dernière phrase à analyser (incluse). Doit être supérieur ou égal à l'index de début. « Toutes les phrases » traite jusqu'à la fin du fichier.">
                Index de fin (Excel)
              </FieldLabel>
              <div className="check-row" style={{marginBottom:8}}>
                <input type="checkbox" id="all_sent" checked={settings.all_sentences}
                  onChange={e=>set("all_sentences",e.target.checked)}/>
                <label htmlFor="all_sent">Toutes les phrases</label>
              </div>
              {!settings.all_sentences && (() => {
                const lastRow = totalRows ? totalRows + 1 : null;
                return (
                  <input type="number"
                    min={displayStart}
                    max={lastRow ?? undefined}
                    value={settings.max_sentences === "all" ? "" : settings.max_sentences}
                    placeholder={lastRow ? `jusqu'à ${lastRow}` : "Index de fin"}
                    onChange={e => {
                      const v = parseInt(e.target.value);
                      if (isNaN(v)) { set("max_sentences", ""); return; }
                      const clamped = lastRow
                        ? Math.min(Math.max(displayStart, v), lastRow)
                        : Math.max(displayStart, v);
                      set("max_sentences", clamped);
                    }}/>
                );
              })()}
            </div>
            <div className="field" style={{display:"flex",alignItems:"flex-end",paddingBottom:1}}>
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                <div className="check-row">
                  <input type="checkbox" id="cache" checked={settings.use_analysis_cache}
                    onChange={e=>set("use_analysis_cache",e.target.checked)}/>
                  <label htmlFor="cache">Cache d'analyse</label>
                </div>
                <InfoBubble text="Si activé, les phrases déjà analysées sont récupérées depuis le cache local plutôt que renvoyées au modèle. Accélère considérablement les relances sur les mêmes données."/>
              </div>
            </div>
          </div>

          <div className="field" style={{marginTop:8}}>
            <FieldLabel info="Propriétés linguistiques que le modèle devra annoter. Décocher une propriété la retire de l'analyse et réduit le coût en tokens.">
              Propriétés à analyser
            </FieldLabel>
            <PropsSelector selected={settings.selected_props}
              onChange={v=>set("selected_props",v)}/>
          </div>
        </div>
      )}

      {error && <div className="err-inline">{error}</div>}
      {hasRunningJob && (
        <div style={{
          background:"color-mix(in srgb,var(--warn) 12%,transparent)",
          border:"1px solid color-mix(in srgb,var(--warn) 35%,transparent)",
          borderRadius:"var(--radius)",padding:"8px 12px",fontSize:12,
          color:"var(--warn)",marginTop:10,
        }}>
          ⚠️ Un job est déjà en cours. Attendez qu'il se termine ou arrêtez-le depuis l'onglet Jobs avant d'en lancer un nouveau.
        </div>
      )}
      <button className="btn btn-primary" onClick={submit} disabled={loading || hasRunningJob} style={{marginTop:12}}>
        {loading ? "Envoi en cours…" : "Lancer l'analyse →"}
      </button>
    </div>
  );
}

// ── LogPanel ──────────────────────────────────────────────────────────────

function LogPanel({ jobId, status }) {
  const [open, setOpen]   = useState(false);
  const [lines, setLines] = useState([]);
  const sinceRef          = useRef(0);
  const bodyRef           = useRef(null);
  const intervalRef       = useRef(null);

  useEffect(() => {
    if (!open) return;
    sinceRef.current = 0;
    setLines([]);
    const poll = () => {
      fetch(`${API}/jobs/${jobId}/logs?since=${sinceRef.current}`)
        .then(r=>r.json())
        .then(d => {
          if (d.lines.length > 0) {
            setLines(prev => [...prev, ...d.lines]);
            sinceRef.current = d.total;
          }
        }).catch(()=>{});
    };
    poll();
    intervalRef.current = setInterval(poll, 1500);
    return () => clearInterval(intervalRef.current);
  }, [open, jobId]);

  useEffect(() => {
    if (bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
  }, [lines]);

  useEffect(() => {
    if (status !== "running") clearInterval(intervalRef.current);
  }, [status]);

  function lineClass(l) {
    if (l.includes("[WARNING]") || l.includes("WARNING")) return "log-line warn";
    if (l.includes("[ERROR]") || l.includes("ERROR")) return "log-line error";
    return "log-line";
  }

  return (
    <div className="logs-panel">
      <div className="logs-header" onClick={()=>setOpen(o=>!o)}>
        <span>📋 Logs {lines.length > 0 && `(${lines.length} lignes)`}</span>
        <span>{open ? "▲ masquer" : "▼ afficher"}</span>
      </div>
      {open && (
        <div className="logs-body" ref={bodyRef}>
          {lines.length === 0
            ? <span className="logs-empty">Aucun log pour l'instant…</span>
            : lines.map((l,i) => <div key={i} className={lineClass(l)}>{l}</div>)
          }
        </div>
      )}
    </div>
  );
}

// ── JobRecap ──────────────────────────────────────────────────────────────

function JobRecap({ params }) {
  const [open, setOpen] = useState(false);
  if (!params) return null;

  const modeLabels = {
    oral: "Dialogues authentiques",
    "écrit_ia": "Dialogues romanesques",
    "écrit": "Écrit",
    "écrit_test": "Écrit test",
  };

  // selected_props is now stored as an array (or null) from the server
  const props = (() => {
    if (!params.selected_props) return null;
    if (Array.isArray(params.selected_props)) return params.selected_props;
    try { return JSON.parse(params.selected_props); }
    catch { return null; }
  })();
  const propLabels = props && props.length > 0
    ? props.map(k => ALL_PROPS.find(p=>p.key===k)?.label ?? k).join(", ")
    : "toutes";

  const items = [
    ["Fichier", params.original_file],
    ["Mode", modeLabels[params.mode] ?? params.mode],
    ["Début (Excel)", (params.start_sent ?? 0) + 2],
    ["Phrases max", params.max_sentences ?? "all"],
    ["Batch size", params.batch_size],
    ["Threads", params.n_threads],
    ["Cache", params.use_analysis_cache ? "oui" : "non"],
  ];

  return (
    <div style={{marginTop:4}}>
      <button className="recap-toggle" onClick={()=>setOpen(o=>!o)}>
        {open ? "▲ masquer le récap" : "▼ voir les options"}
      </button>
      {open && (
        <div className="recap-box">
          {items.map(([k,v])=>(
            <div className="recap-item" key={k}>
              <span className="recap-key">{k} :</span>
              <span className="recap-val">{String(v)}</span>
            </div>
          ))}
          <div className="recap-item" style={{gridColumn:"1/-1"}}>
            <span className="recap-key">Propriétés :</span>
            <span className="recap-val" style={{whiteSpace:"normal",fontFamily:"inherit"}}>{propLabels}</span>
          </div>
        </div>
      )}
    </div>
  );
}

// ── JobRow ────────────────────────────────────────────────────────────────

function JobRow({ job, onView, onDelete, onStop, onRelaunch, serverOk, stopping }) {
  const dur = duration(job.created_at, job.finished_at);
  const pct = job.progress ?? 0;
  const isRunning = job.status === "running";
  const isHistoryOnly = job._historyOnly;

  return (
    <div className="job-row">
      <StatusPill status={job.status} stopping={stopping}/>

      <div className="job-body">
        <div className="job-expr">{job.params.expression}</div>
        <div className="job-meta">
          <span title="fichier source">{job.params.original_file}</span>
          <span>{job.params.mode}</span>
          {job.n_sentences > 0 && <span>{job.n_sentences} phrases</span>}
          {dur && <span>⏱ {dur}</span>}
          <span>{timeAgo(job.created_at)}</span>
          {isHistoryOnly && <span style={{color:"var(--warn)",fontStyle:"italic"}}>hors-ligne</span>}
        </div>

        {!isHistoryOnly && (
          <div className="job-progress-wrap">
            <div className="job-progress-bar">
              <div className={`job-progress-fill ${job.status}`} style={{width:`${pct}%`}}/>
            </div>
          </div>
        )}

        <JobRecap params={job.params}/>

        {!isHistoryOnly && <LogPanel jobId={job.id} status={job.status}/>}
      </div>

      <div className="job-actions">
        {(job.status==="done") && (
          <button className="btn btn-ghost" style={{fontSize:12,padding:"5px 12px"}}
            onClick={()=>onView(job)}>Résultats</button>
        )}
        {job.status==="error" && (
          <button className="btn btn-ghost" style={{fontSize:12,padding:"5px 12px"}}
            onClick={()=>onView(job)}>Erreur</button>
        )}
        {isRunning && serverOk && (
          <button className="btn btn-warn" style={{fontSize:11,padding:"4px 10px"}}
            onClick={()=>onStop(job.id)} disabled={stopping}>
            {stopping ? "Arrêt…" : "⏹ Arrêter"}
          </button>
        )}
        {(job.status==="error" || job.status==="done" || isHistoryOnly) && serverOk && (
          <button className="btn btn-ghost" style={{fontSize:11,padding:"4px 10px",color:"var(--accent)"}}
            onClick={()=>onRelaunch(job)}>↺ Relancer</button>
        )}
        {!isRunning && (
          <button className="btn btn-ghost" style={{fontSize:12,padding:"5px 10px",color:"var(--muted)"}}
            onClick={()=>onDelete(job.id)} title="Supprimer ce job">✕</button>
        )}
      </div>
    </div>
  );
}

// ── ResultsPanel ──────────────────────────────────────────────────────────

function ResultsPanel({ job, onBack }) {
  const [files, setFiles] = useState(null);

  useEffect(() => {
    if (job.status !== "done") return;
    fetch(`${API}/results/${job.id}`).then(r=>r.json()).then(d=>setFiles(d.files)).catch(()=>setFiles([]));
  }, [job.id, job.status]);

  function typeClass(s) {
    if (s===".xlsx") return "xlsx"; if (s===".pdf") return "pdf";
    if (s===".json") return "json"; return "other";
  }

  return (
    <div>
      <div className="results-back" onClick={onBack}>← Retour aux jobs</div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
        <span style={{fontWeight:700,fontSize:15}}>{job.params.expression}</span>
        <StatusPill status={job.status}/>
      </div>

      {job.status==="done" && (
        <div className="stats">
          {[["Phrases",job.n_sentences],["Tokens in",job.tokens_in?.toLocaleString()],
            ["Tokens out",job.tokens_out?.toLocaleString()],["Total",((job.tokens_in||0)+(job.tokens_out||0)).toLocaleString()]
          ].map(([l,v])=>(
            <div className="stat" key={l}><div className="label">{l}</div><div className="value">{v}</div></div>
          ))}
        </div>
      )}

      {job.status==="error" && (
        <div className="card" style={{marginBottom:16}}>
          <div className="card-title">Erreur</div>
          <div className="error-box">{job.error}</div>
        </div>
      )}

      {job.status==="done" && (
        <div className="card">
          <div className="card-title">Fichiers produits</div>
          {!files && <p style={{color:"var(--muted)",fontSize:12}}>Chargement…</p>}
          {files?.length===0 && <p style={{color:"var(--muted)",fontSize:12}}>Aucun fichier.</p>}
          {files?.length>0 && (
            <>
              <div className="file-grid">
                {files.map(f=>(
                  <a key={f.path} className="file-card"
                    href={`${API}/download/${job.id}/${encodeURIComponent(f.name)}`} download={f.name}>
                    <div className="fname">{f.name}</div>
                    <div className="fmeta">{f.size_kb} KB</div>
                    <span className={`ftype ${typeClass(f.suffix)}`}>{f.suffix.replace(".","")}</span>
                  </a>
                ))}
              </div>
              <p style={{fontSize:11,color:"var(--muted)",marginTop:12}}>📁 {job.output_dir}</p>
            </>
          )}
        </div>
      )}
    </div>
  );
}

// ── RelaunchModal ─────────────────────────────────────────────────────────

function RelaunchModal({ job, onClose, onConfirm }) {
  return (
    <div style={{
      position:"fixed",inset:0,background:"rgba(0,0,0,.6)",
      display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,
    }} onClick={onClose}>
      <div style={{
        background:"var(--surface)",border:"1px solid var(--border)",
        borderRadius:"var(--radius)",padding:24,maxWidth:400,width:"90%",
      }} onClick={e=>e.stopPropagation()}>
        <div style={{fontWeight:700,marginBottom:8}}>Relancer le job</div>
        <p style={{fontSize:13,color:"var(--muted)",marginBottom:16}}>
          Relancer « <strong style={{color:"var(--text)"}}>{job.params.expression}</strong> » avec les mêmes paramètres ?
        </p>
        <p style={{fontSize:11,color:"var(--warn)",marginBottom:16}}>
          ⚠️ Le fichier d'origine ({job.params.original_file}) doit être re-sélectionné manuellement.
        </p>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          <button className="btn btn-ghost" onClick={onClose}>Annuler</button>
          <button className="btn btn-primary" onClick={()=>onConfirm(job)}>Aller au formulaire →</button>
        </div>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────

function App() {
  const [theme, setTheme]         = useState(() => localStorage.getItem("ppi_theme") || "dark");
  const [tab, setTab]             = useState("launch");
  const [liveJobs, setLiveJobs]   = useState([]);
  const [histJobs, setHistJobs]   = useState(() => loadJobHistory());
  const [selected, setSel]        = useState(null);
  const [toast, setToast]         = useState(null);
  const [serverOk, setOk]         = useState(null);
  const [relaunchJob, setRelaunch]= useState(null);
  const [stoppingIds, setStoppingIds] = useState(new Set());

  useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
    localStorage.setItem("ppi_theme", theme);
  }, [theme]);

  useEffect(() => {
    fetch(`${API}/health`).then(()=>setOk(true)).catch(()=>setOk(false));
    const t = setInterval(()=>fetch(`${API}/health`).then(()=>setOk(true)).catch(()=>setOk(false)), 10000);
    return ()=>clearInterval(t);
  }, []);

  const fetchJobs = useCallback(() => {
    fetch(`${API}/jobs`).then(r=>r.json()).then(data => {
      setLiveJobs(data);
      // Merge into history: update existing entries, add new finished ones
      // Only persist non-running jobs so restarts don't show ghost running jobs
      setHistJobs(prev => {
        const map = new Map(prev.map(j=>[j.id,j]));
        data.forEach(j => map.set(j.id, j));
        const merged = Array.from(map.values())
          .sort((a,b)=>b.created_at.localeCompare(a.created_at))
          .slice(0, 100); // cap history
        // Only persist finished jobs to localStorage
        const toSave = merged.filter(j => j.status !== "running");
        saveJobHistory(toSave);
        return merged;
      });
    }).catch(()=>{});
  }, []);

  useEffect(() => {
    fetchJobs();
    const id = setInterval(fetchJobs, 3000);
    return () => clearInterval(id);
  }, [fetchJobs]);

  // Update selected job when live data refreshes
  useEffect(() => {
    if (!selected) return;
    const up = liveJobs.find(j=>j.id===selected.id);
    if (up) setSel(up);
  }, [liveJobs]);

  // Clear stopping flag when job leaves running state
  useEffect(() => {
    if (stoppingIds.size === 0) return;
    const stillRunning = new Set(liveJobs.filter(j=>j.status==="running").map(j=>j.id));
    setStoppingIds(prev => {
      const next = new Set([...prev].filter(id => stillRunning.has(id)));
      return next.size === prev.size ? prev : next;
    });
  }, [liveJobs]);

  // Merged jobs for display: live jobs take precedence, history fills the rest
  const liveIds = new Set(liveJobs.map(j=>j.id));
  const jobs = [
    ...liveJobs,
    ...histJobs.filter(j=>!liveIds.has(j.id)).map(j=>({...j, _historyOnly:true})),
  ].sort((a,b)=>b.created_at.localeCompare(a.created_at));

  function handleJobStarted(job_id, expr, params) {
    setToast(`Job lancé : « ${expr} »`);
    setTab("jobs");
    fetchJobs();
  }

  async function handleStop(id) {
    const res = await fetch(`${API}/jobs/${id}/stop`, { method: "POST" }).catch(() => null);
    if (res?.ok) {
      setStoppingIds(prev => new Set([...prev, id]));
      setToast("Signal d'arrêt envoyé — attente de la fin du batch en cours…");
    } else {
      setToast("Impossible d'arrêter le job.");
    }
    fetchJobs();
  }

  async function handleDelete(id) {
    try {
      const res = await fetch(`${API}/jobs/${id}`, { method: "DELETE" });
      if (!res.ok && res.status !== 404) {
        const e = await res.json().catch(() => ({ detail: "Erreur inconnue" }));
        setToast("❌ " + e.detail);
        return;
      }
    } catch {}
    setHistJobs(prev => {
      const next = prev.filter(j => j.id !== id);
      saveJobHistory(next);
      return next;
    });
    fetchJobs();
    if (selected?.id === id) setSel(null);
  }

  function handleRelaunch(job) {
    setRelaunch(job);
  }

  function confirmRelaunch(job) {
    setRelaunch(null);
    // Pre-populate form via localStorage with job's params
    const settings = {
      mode: job.params.mode ?? "oral",
      start_sent: (job.params.start_sent ?? 0) + 2,
      max_sentences: job.params.max_sentences ?? "all",
      all_sentences: job.params.max_sentences === "all",
      batch_size: job.params.batch_size ?? 5,
      n_threads: job.params.n_threads ?? 8,
      use_analysis_cache: job.params.use_analysis_cache !== false,
      selected_props: (() => {
        try {
          const sp = job.params.selected_props;
          if (Array.isArray(sp)) return sp;
          if (typeof sp === "string") return JSON.parse(sp);
        } catch {}
        return ALL_PROPS.map(p=>p.key);
      })(),
    };
    saveSettings(settings);
    setTab("launch");
    setToast("Paramètres pré-remplis — sélectionnez le fichier et lancez.");
  }

  const running = liveJobs.filter(j=>j.status==="running").length;

  return (
    <div className="app">
      <header>
        <div className="header-top">
          <div className="logos">
            <img src={UGA_LOGO} alt="UGA" title="Université Grenoble Alpes"
              onError={e=>e.target.style.display="none"}/>
            <div className="header-divider"/>
            <img src={LIDILEM_LOGO} alt="LIDILEM" title="LIDILEM"
              onError={e=>e.target.style.display="none"}/>
            <div className="header-divider"/>
            <PrefabBadge/>
          </div>

          <div className="header-titles">
            <h1>Analyse automatique des Phrases préfabriquées des interactions</h1>
            <p>Projet ANR PREFAB · LIDILEM, Université Grenoble Alpes</p>
          </div>

          <div className="header-actions">
            <button className="theme-btn" title="Basculer le thème"
              onClick={()=>setTheme(t=>t==="dark"?"light":"dark")}>
              {theme==="dark"?"☀️":"🌙"}
            </button>
            {serverOk===true  && <><div className="server-dot"/><span className="server-status">serveur actif</span></>}
            {serverOk===false && <span className="server-status" style={{color:"var(--danger)"}}>serveur inaccessible</span>}
          </div>
        </div>
      </header>

      {serverOk===false && (
        <div className="offline-notice">
          ⚠️ Serveur inaccessible — l'historique local est affiché mais les actions en ligne ne sont pas disponibles.
        </div>
      )}

      <div className="site-banner">
        <div className="banner-text">
          <h2>Analyse automatique des PPIs</h2>
          <p>Phrases Préfabriquées des Interactions · ANR PREFAB</p>
        </div>
      </div>

      <div className="tabs">
        <button className={`tab ${tab==="launch"?"active":""}`}
          onClick={()=>{setTab("launch");setSel(null)}}>Lancer</button>
        <button className={`tab ${tab==="jobs"?"active":""}`}
          onClick={()=>{setTab("jobs");setSel(null)}}>
          Jobs {running>0&&<span className="tab-badge">{running}</span>}
          {jobs.length>0&&<span style={{marginLeft:5,fontSize:10,color:"var(--muted)"}}>({jobs.length})</span>}
        </button>
      </div>

      <div className="content">
        {tab==="launch" && <AnalyseForm onJobStarted={handleJobStarted} hasRunningJob={running > 0}/>}

        {tab==="jobs" && !selected && (
          jobs.length===0
            ? <div className="empty"><div className="icon">📭</div><div>Aucun job pour l'instant.</div></div>
            : <div className="jobs-list">
                {jobs.map(j=>(
                  <JobRow key={j.id} job={j} onView={setSel}
                    onDelete={handleDelete} onStop={handleStop}
                    onRelaunch={handleRelaunch} serverOk={serverOk}
                    stopping={stoppingIds.has(j.id)}/>
                ))}
              </div>
        )}

        {tab==="jobs" && selected && (
          <ResultsPanel job={selected} onBack={()=>setSel(null)}/>
        )}
      </div>

      {toast && <Toast msg={toast} onDone={()=>setToast(null)}/>}
      {relaunchJob && <RelaunchModal job={relaunchJob} onClose={()=>setRelaunch(null)} onConfirm={confirmRelaunch}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
